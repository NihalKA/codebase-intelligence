# docker-compose.yml
# Generated by: Coder agent (Phase 1)
# All services run on the internal codebase-net network
# No services expose data outside this network
# Passwords and keys come from .env — never hardcoded here
#
# Requires: infrastructure/.env (copy from .env.example — never commit .env to Git)
# Docker Compose auto-loads .env from this directory when run with:
#   docker compose -f infrastructure/docker-compose.yml up -d

networks:
  codebase-net:
    driver: bridge

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    networks:
      - codebase-net
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: always
    networks:
      - codebase-net
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt protocol
    volumes:
      - ./neo4j_data:/data
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    networks:
      - codebase-net
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_models:/root/.ollama
    healthcheck:
      # curl is not present in the ollama/ollama image — use 'ollama list' instead.
      # start_period gives the server time to initialise before health checks begin.
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # Uncomment below to enable GPU support (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    networks:
      - codebase-net
    ports:
      - "3000:8080"
    volumes:
      - ./openwebui_data:/app/backend/data
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      # Disable login — internal server, no auth required
      WEBUI_AUTH: "false"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      # Healthcheck uses internal port 8080 — Open WebUI runs on 8080 inside container
      # External access is via port 3000 (mapped in ports: above)
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    networks:
      - codebase-net
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console UI
    volumes:
      - ./minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  sourcegraph:
    # Sourcegraph does not publish a 'latest' tag — pin to a specific version.
    # Check https://hub.docker.com/r/sourcegraph/server/tags for newer releases.
    image: sourcegraph/server:6.12.5040
    # Sourcegraph only publishes amd64 images — on Apple Silicon this runs via
    # Rosetta 2 emulation. Slower than native but fully functional for dev use.
    platform: linux/amd64
    container_name: sourcegraph
    restart: always
    networks:
      - codebase-net
    ports:
      - "7080:7080"   # HTTP UI and API
    volumes:
      - ./sourcegraph_config:/etc/sourcegraph
      - ./sourcegraph_data:/var/opt/sourcegraph
    healthcheck:
      # Sourcegraph takes 2-3 minutes to fully start — 120s start_period accounts for this
      test: ["CMD", "curl", "-f", "http://localhost:7080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
